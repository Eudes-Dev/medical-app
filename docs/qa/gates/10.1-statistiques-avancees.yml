    notes: >-
      requireUser() en tête de getCabinetStatistics (défense en profondeur) + middleware /dashboard/*
      (1ʳᵉ ligne). Aucune donnée patient nominative exposée (agrégats + libellés de soins). Lecture
      seule, aucune écriture.
  performance:
    status: PASS
    notes: >-
      2 requêtes Prisma (RDV + patients) à select minimal, agrégation en mémoire ; index startTime.
      Page force-dynamic (attendu pour une page authentifiée par cookies).
  reliability:
    status: PASS
    notes: >-
      Pas de division par zéro (rate1dp/pctTrend gardés ; total=0 → 0). Conversion Decimal→number
      explicite. Résultat sérialisable (dates ISO). Couvert par 10.1-UNIT-010 (fenêtres vides).
  maintainability:
    status: PASS
    notes: >-
      Séparation nette logique pure (sans I/O, 10 tests directs) vs couche d'accès (server-only, 4
      tests intégration). Réutilise pctTrend/format EUR existants, primitives Shadcn (ADR §4). Alias
      de test server-only additif et documenté.

