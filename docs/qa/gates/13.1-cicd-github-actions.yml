# Quality Gate — Story 13.1 : Pipeline CI/CD GitHub Actions
# Généré par Quinn (Test Architect) via *review (boucle /bmad-loop, formalisation a posteriori).
schema: 1
story: "13.1"
story_title: "Pipeline CI/CD GitHub Actions (débloque l'exécution E2E 3.6/5.2)"
gate: PASS
status_reason: >-
  10/10 AC couverts. Workflow .github/workflows/ci.yml (commit 0e2065e) : déclencheurs push main +
  pull_request, concurrence cancel-in-progress. Job `test` (Postgres jetable postgres:16) — portes
  dures `npm run test:run` (Vitest, sans base) et `npm run build` (précédé de migrate deploy sur base
  CI jetable) ; portes informatives lint + tsc (continue-on-error, dette baseline assumée). Job `e2e`
  opt-in (vars.E2E_ENABLED) débloquant enfin les suites Playwright 3.6/5.2, réutilisant l'infra de test
  existante + garde-fou anti-prod. Aucun code applicatif, aucune migration, aucune dépendance ajoutée.
  Porte dure principale reproduite localement : 91 fichiers / 800 tests verts. Build validé sur l'arbre
  courant (boucle 10.2). CD (Vercel) hors périmètre (13.2) ; pas de migrate deploy prod (OPS-002).
reviewer: "Quinn (Test Architect)"
updated: "2026-06-26T17:20:00Z"

waiver:
  active: false

quality_score: 90

top_issues:
  - id: BASELINE-131
    severity: low
    finding: >-
      Les portes lint (`npm run lint`) et type-check (`npx tsc --noEmit`) sont en
      `continue-on-error: true` (informatives, non bloquantes). La CI ne casse donc pas sur les
      erreurs eslint/tsc, qui restent tolérées.
    status: accepted_by_design
    mitigation: >-
      Choix assumé et documenté dans l'en-tête du workflow : dette baseline connue (apostrophes JSX,
      `as any` des mocks de test, narrowing de filtres Prisma — TEST-BASELINE-001). Rendre ces portes
      dures ferait échouer la CI sur de la dette pré-existante non liée à la PR. Durcissement = story
      future une fois la dette résorbée. Les portes FONCTIONNELLES (Vitest + build) restent dures.
  - id: PROCESS-131
    severity: low
    finding: >-
      Workflow initialement livré directement (commit 0e2065e) HORS boucle BMAD : aucun fichier story,
      aucune gate QA, 13.1 resté listé « backlog post-MVP » sans fichier au ROADMAP au moment du commit.
    status: resolved
    mitigation: >-
      Remédié par cette boucle : story 13.1 reconstruite fidèlement au workflow committé, gate QA
      produite, ROADMAP mis à jour (épopée 13 ouverte). Aucune nouvelle surface applicative à couvrir
      (artefact d'infra déclaratif).
  - id: OPS-131
    severity: low
    finding: >-
      La validité « end-to-end » du pipeline (exécution réelle sur GitHub Actions) et l'activation du
      job e2e (pose de la variable E2E_ENABLED + secrets Supabase de test) ne sont pas vérifiables
      dans la boucle : elles requièrent un push + une configuration de dépôt humaine.
    status: open
    mitigation: >-
      Action ops/humaine : pousser sur main/ouvrir une PR pour observer le premier run vert, puis poser
      E2E_ENABLED=true + les 3 secrets SUPABASE_*_TEST (cf. .env.test.example) pour activer 3.6/5.2.
      Hors garde-fou de boucle (pas de push automatique). Les portes dures sont reproductibles localement
      (Vitest 91/800 vert), ce qui borne fortement le risque d'un premier run rouge.

quality_score_notes: >-
  90 (−5 pour BASELINE-131 : lint/types non bloquants, dette baseline assumée ; −5 pour OPS-131 :
  exécution réelle/activation e2e non vérifiables en boucle. PROCESS-131 résolu, sans impact sur le score).

