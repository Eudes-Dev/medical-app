nfr_validation:
  security:
    status: CONCERNS
    notes: >-
      Rate-limiter branché sur getAvailableSlots (30/min/IP), createGuestBooking (5/10min/IP) et
      cancelByToken (10/10min/IP), erreurs neutres mappées (RATE_LIMITED). Route d'annulation
      publique correctement protégée par token UUID opaque + message neutre anti-énumération,
      idempotente, sans fuite (test SERVER neutre). Faiblesses : extraction d'IP falsifiable
      (SEC-002, medium) et GET page d'annulation non throttlé (SEC-003, low). Limiteur en mémoire
      single-instance documenté (réinitialisé au cold start, non distribué) — protection partielle
      en déploiement serverless multi-instance.
  reliability:
    status: PASS
    notes: >-
      REL-001 clos : correction TZ centralisée (lib/cabinet/timezone.ts, source unique
      CABINET_TIMEZONE via date-fns-tz + Intl), prouvée indépendante du fuseau process en CET ET
      CEST (tests asserts UTC, runner UTC = repro Vercel). zonedDayBoundsUtc robuste aux jours de
      23h/25h. cancelByToken idempotent (déjà CANCELLED ⇒ succès silencieux), email d'annulation
      fire-and-forget. Init paresseuse du client Resend (getResend) — supprime un crash à l'import.
  performance:
    status: PASS
    notes: >-
      Rate-limiter O(n) sur des seaux courts (pruning par fenêtre), check avant toute requête DB.
      Requêtes par jour bornées par zonedDayBoundsUtc, Promise.all (appointments + timeOff),
      select Prisma restreints. Pas de N+1 introduit.
  maintainability:
    status: PASS
    notes: >-
      Module TZ isolé et densément documenté, réutilisé par slots.ts / time-off.ts / actions.ts
      (DRY). Limiteur signature stable (point d'extension Upstash documenté). Tests ciblés et
      lisibles (un test = un comportement). Procédure de migration et fiches dette à jour.

