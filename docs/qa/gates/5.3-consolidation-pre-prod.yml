top_issues:
  - id: "SEC-002"
    severity: medium
    title: "Rate-limiter : IP dérivée du x-forwarded-for gauche (falsifiable)"
    description: >-
      getClientIp() (lib/server/rate-limit.ts:75-83) retient la PREMIÈRE valeur de
      `x-forwarded-for`, contrôlée par le client. Un attaquant qui fait tourner cet en-tête
      contourne intégralement le seau par-IP, neutralisant la protection SEC-001. Sur Vercel,
      la valeur de confiance est l'IP ajoutée par la plateforme (position droite de la chaîne
      proxy, ou `request.ip` / en-tête de confiance équivalent). Acceptable pour un MVP
      single-instance, mais la protection effective est plus faible que l'AC 4/5 ne le laisse
      entendre. Recommandation : dériver l'IP d'une position de proxy de confiance.
    refs:
      - "lib/server/rate-limit.ts:75-83"
    suggested_owner: dev
  - id: "SEC-003"
    severity: low
    title: "GET de la page d'annulation non rate-limité"
    description: >-
      La Server Action cancelByToken est rate-limitée, mais le rendu de la page
      (cancel/page.tsx:36-41) exécute un prisma.appointment.findUnique({ where:
      { cancellationToken } }) non authentifié et non throttlé à chaque GET. Un token valide
      révèle date + type du RDV. Le token étant un UUID v4 (122 bits, énumération infaisable)
      et l'accès en lecture seule, la sévérité est faible. Défense en profondeur : throttler
      aussi la lecture de page, ou centraliser le lookup throttlé.
    refs:
      - "app/(public)/[cabinet-slug]/book/cancel/page.tsx:36-41"
    suggested_owner: dev
  - id: "OPS-002"
    severity: medium
    title: "AC 11 / AC 14 : migrate deploy et E2E non exécutés (par conception)"
    description: >-
      `prisma migrate status` / `migrate deploy` (AC 11) et la suite Playwright (AC 14) ne sont
      pas exécutables depuis la sandbox dev (base Supabase injoignable P1001 ; .env.test absent
      bloquant le global-setup). Ces deux points sont correctement consignés
      (docs/dette/2026-05-30-procedure-migration-prod.md ; 2026-05-16-prerequis-execution-e2e-
      playwright.md) et explicitement cadrés comme actions ops/CI. Conséquence : deux conditions
      bloquant la PROD restent vérifiées-comme-pending. À clore par l'ops au déploiement (+ CI
      13.1) avant exposition publique.
    refs:
      - "docs/dette/2026-05-30-procedure-migration-prod.md"
      - "docs/dette/2026-05-16-prerequis-execution-e2e-playwright.md"
    suggested_owner: ops
  - id: "OPS-003"
    severity: low
    title: "Migration enum ADD VALUE — vérifier la cible Postgres"
    description: >-
      20260530000006 utilise `ALTER TYPE \"MessageType\" ADD VALUE IF NOT EXISTS`. Les valeurs
      sont seulement ajoutées (jamais consommées dans la même migration), donc compatible
      Postgres 12+ en transaction (Supabase = PG15 → OK). À garder à l'esprit si la cible
      changeait : `ADD VALUE` en transaction est interdit avant PG12.
    refs:
      - "prisma/migrations/20260530000006_add_reminders_optout/migration.sql:19-20"
    suggested_owner: ops

