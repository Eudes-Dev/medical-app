# Quality Gate — Story 13.3 : Monitoring des erreurs Sentry (gated, RGPD-safe)
# Généré par Quinn (Test Architect) via *review (boucle /bmad-loop).
schema: 1
story: "13.3"
story_title: "Monitoring des erreurs Sentry (gated, RGPD-safe)"
gate: PASS
status_reason: >-
  8/8 AC couverts. Intégration @sentry/nextjs ^10 (compatible Next 16, peer next ^16.0.0-0)
  ACTIVÉE uniquement si un DSN est présent (no-op total sinon — pattern SMS_ENABLED / chiffrement).
  Logique pure isolée et testée (lib/observability/sentry.ts) : gating, environnement, sampling,
  et surtout expurgation RGPD `scrubSentryEvent` (suppression user/cookies/corps/en-têtes d'auth,
  redaction des tokens d'URL) branchée en `beforeSend` server/edge/client, avec sendDefaultPii=false
  et Session Replay désactivé. Wiring App Router (instrumentation.ts + onRequestError, configs
  server/edge, instrumentation-client.ts) ; next.config enveloppé par withSentryConfig (silent,
  source maps gated sur SENTRY_AUTH_TOKEN). Aucun compte/DSN réel créé, aucun événement émis, aucun
  secret committé. Preuve : 13 tests unitaires verts, suite complète 93 fichiers / 819 tests verte,
  `next build` vert (type-check inclus) sur Next 16 + Turbopack.
reviewer: "Quinn (Test Architect)"
updated: "2026-06-26T20:16:00Z"

waiver:
  active: false

quality_score: 90

top_issues:
  - id: RGPD-133
    severity: medium
    finding: >-
      Le SDK Sentry capture par défaut un contexte riche (URL, en-têtes, corps, IP, identité)
      — vecteur de fuite de données de santé pour une app patient.
    status: mitigated
    mitigation: >-
      Défense en profondeur : sendDefaultPii=false + beforeSend=scrubSentryEvent (pur, testé par
      13.3-UNIT-010/011 : retire user/cookies/corps/en-têtes cookie+authorization, redacte les
      tokens de query_string et d'url) + Session Replay désactivé (replays*SampleRate=0). Runbook
      docs/ops/13.3-monitoring-sentry.md rappelle de ne pas réactiver Replay/PII sans revue RGPD et
      de garder les tests verts. Risque résiduel borné aux champs non anticipés d'un futur SDK.
  - id: DEPS-133
    severity: low
    finding: >-
      L'ajout de @sentry/nextjs amène une large arborescence transitive ; `npm install` rapporte
      26 vulnérabilités (1 low, 8 moderate, 15 high, 2 critical) sur l'ensemble de l'arbre.
    status: open
    mitigation: >-
      À auditer hors story (npm audit) : majoritairement transitif et antérieur ; non spécifique au
      chemin runtime exécuté (Sentry inerte sans DSN). Recommandation : triage `npm audit` dédié,
      éventuellement story de durcissement dépendances.
  - id: OPS-133
    severity: low
    finding: >-
      L'émission réelle d'événements vers Sentry (et la vérification de l'absence de PII côté
      dashboard) nécessite un DSN réel et un déploiement — non vérifiable dans la boucle.
    status: open
    mitigation: >-
      Action ops/humaine documentée (runbook §6) : créer le projet (plan gratuit), poser le DSN,
      déclencher une erreur de test, confirmer la réception ET l'absence de données patient. Le
      scrubbing est prouvé unitairement ; le build prouve l'intégration.

quality_score_notes: >-
  90 (−5 RGPD-133 : risque intrinsèque du SDK, mitigé et testé mais à surveiller ; −5 cumul
  DEPS-133/OPS-133 : audit dépendances à mener + activation réelle non vérifiable en boucle).

