nfr_validation:
  security:
    status: PASS
    notes: >-
      Coeur de la story. sendDefaultPii=false + scrubSentryEvent (cookies/corps/auth/user retirés,
      tokens d'URL redactés) + Replay désactivé. Aucun DSN/secret committé. Le module n'expose aucune
      donnée ; il décide seulement d'activer/expurger. Test garde-fou de pureté (non-mutation) inclus.
  reliability:
    status: PASS
    notes: >-
      No-op robuste sans DSN (aucune init, aucun warning) → previews/CI/dev inchangés. onRequestError
      capture les erreurs serveur ; build gated sur token évite tout échec d'upload source maps.
  maintainability:
    status: PASS
    notes: >-
      Logique pure centralisée et abondamment commentée ; init server/edge/client minimalistes
      délèguent toutes à baseSentryOptions (DRY) ; runbook clair. scrubSentryEvent générique = couplage
      nul aux types du SDK tout en restant type-safe.
  performance:
    status: PASS
    notes: "tracesSampleRate défaut 0 (erreurs seules) → overhead négligeable ; Sentry inerte sans DSN."

