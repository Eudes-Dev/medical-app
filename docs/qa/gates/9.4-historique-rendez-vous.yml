gate: PASS
status_reason: >-
  10/10 AC couverts. Modèle Appointment étendu de 3 colonnes optionnelles (motif/modalite/lieu)
  + migration non destructive (ADD COLUMN only) ; la « Note » réutilise Appointment.notes. Mapping
  serveur (getPatientById/updatePatient) des 4 champs désormais couvert par tests 9.4-INT-001/002.
  Composant AppointmentHistory (filtres + compteurs, lignes dépliables Motif/Durée/Modalité/Lieu/Note,
  badges, pagination « charger plus », état vide) purement présentationnel, sans surface réseau.
  Refonte UI des sections 9.1/9.2/9.3 sans rupture de contrat (suites existantes vertes). Suite
  complète verte (74 fichiers / 691 tests, +2 vs baseline 689, aucune régression). Build OK.
