top_issues:
  - id: TEST-DEPTH-941
    severity: medium
    finding: >-
      Le composant AppointmentHistory (~567 lignes) porte une logique présentationnelle réelle
      (calcul de durée formatDuration, compteurs de filtres, pagination charger-plus, mapping
      statut/type) qui n'est vérifiée que par inspection : ni test composant ni E2E. Les helpers
      purs (formatDuration, typeVisual, initialsOf, counts) ne sont pas exportés, donc non
      unit-testables en l'état.
    status: open
    mitigation: >-
      Politique dépôt établie (UI non unit-testée ; infra E2E indisponible — cf. 3.6/5.2). La
      logique de DONNÉES (mapping serveur + tri desc) EST couverte (9.4-INT-001/002). Suivi :
      exporter les helpers purs pour les unit-tester, et ajouter un test composant/E2E (filtre,
      dépliage, durée, pagination) une fois l'infra E2E disponible (CI 13.1).
  - id: RGPD-PROD-941
    severity: medium
    finding: >-
      L'historique affiche des données de santé (art. 9 RGPD), comme l'ensemble du dossier patient
      (9.1/9.2/9.3). Lecture sécurisée (actions déjà protégées par requireUser, aucune surface
      publique) mais chiffrement (11.4), audit (11.3) et consentement/oubli (11.1/11.2) non livrés.
    status: accepted_by_design
    mitigation: >-
      Mise en PRODUCTION de tout le dossier patient conditionnée à l'arbitrage PO/RGPD (épopée 11),
      cohérent avec 9.2/9.3. Réserve documentée dans la story.
  - id: PROCESS-941
    severity: low
    finding: >-
      Code initialement livré directement (commit 02c3b00) HORS boucle BMAD : aucun fichier story,
      aucune gate QA, ROADMAP non mise à jour au moment du commit. De plus, le message de commit
      indique « Migration appliquée » (application en base faite hors garde-fou de boucle).
    status: resolved
    mitigation: >-
      Remédié par cette boucle : story 9.4 reconstruite fidèlement au code, couverture de tests
      manquante ajoutée (9.4-INT), revue QA + gate produites, ROADMAP mise à jour. Le garde-fou
      « pas de migrate deploy par la boucle » reste respecté côté boucle ; l'application en base
      d'origine est notée pour traçabilité OPS.

