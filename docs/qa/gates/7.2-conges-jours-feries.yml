top_issues:
  - id: "REL-001"
    severity: medium
    title: "Génération de créneaux dépendante de la TZ serveur (carry-over 4.1/4.2/7.1)"
    description: >-
      generateDaySlots (lib/cabinet/slots.ts:63) utilise setHours en heure locale. Sur runtime
      UTC (Vercel) un créneau "10:00" affiché correspondra à 12:00 (été) / 11:00 (hiver) heure
      de Paris. La 7.2 hérite du défaut SANS l'aggraver : la comparaison calendaire dayKey()
      introduite ici est elle-même insensible à l'heure et donc robuste tant que `date` et les
      bornes désignent le même jour local. À fixer transversalement (date-fns-tz Europe/Paris)
      avant mise en production.
    refs:
      - "lib/cabinet/slots.ts:63"
    suggested_owner: dev
  - id: "SEC-001"
    severity: medium
    title: "Rate limiter absent sur Server Action publique (carry-over 4.1)"
    description: >-
      getAvailableSlots reste une action non authentifiée exposée publiquement. La 7.2 y ajoute
      1 requête supplémentaire (prisma.timeOff.findMany) en parallèle des appointments,
      augmentant marginalement le coût d'un scraping/DoS applicatif. Le TODO story 13.5 est en
      place mais non câblé. Pré-existant, non régressé.
    refs:
      - "app/(public)/[cabinet-slug]/book/actions.ts:97-120"
    suggested_owner: dev
  - id: "REL-002"
    severity: low
    title: "createTimeOff : findMany hors transaction (TOC/TOU mineur)"
    description: >-
      Le calcul des `impacted` (prisma.appointment.findMany lignes 306-314) s'exécute HORS de
      la transaction qui suit. Une nouvelle réservation entre le fetch et l'écriture
      transactionnelle ne serait pas annulée par `notifyCancellations=true`. Mitigation
      existante : une fois la TimeOff active, le tunnel public refuse toute nouvelle
      réservation sur le créneau (AC 6, défense en profondeur testée). Impact pratique faible.
      Recommandation : déplacer le findMany dans `$transaction` par cohérence stricte.
    refs:
      - "app/dashboard/settings/timeoff/actions.ts:306-348"
    suggested_owner: dev
  - id: "MAINT-001"
    severity: low
    title: "Filtre `impacted` dupliqué entre preview et create"
    description: >-
      Le filtre des RDV impactés est implémenté à l'identique dans previewTimeOffImpact
      (lignes 239-249) et createTimeOff (lignes 315-324). Si les règles évoluent (ex. fenêtre
      avec marge H+2), la dérive est probable. Extraction d'un helper privé
      `filterImpactedAppointments(candidates, v)` recommandée.
    refs:
      - "app/dashboard/settings/timeoff/actions.ts:239-324"
    suggested_owner: dev
  - id: "TEST-001"
    severity: low
    title: "AC 7 (états UI) et AC 9 (a11y/responsive) non automatisés (carry-over 7.1)"
    description: >-
      Les composants client (TimeOffManager, TimeOffForm, TimeOffImpactWarning, HolidayList)
      utilisent correctement Skeleton, EmptyState, useTransition et sonner — visuellement
      conformes — mais ne sont pas couverts par tests composant. À mutualiser avec le E2E
      Playwright tunnel (poser un congé → 0 créneau sur /book à cette date → suppression →
      réapparition). Couvert par le TODO Playwright global du projet.
    refs:
      - "components/settings/timeoff-manager.tsx"
      - "components/settings/timeoff-form.tsx"
      - "components/settings/timeoff-impact-warning.tsx"
    suggested_owner: dev

