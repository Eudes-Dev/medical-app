      Rate limiter public manquant (SEC-001, carry-over 4.1).
  performance:
    status: PASS
    notes: >-
      Index @@index([startDate, endDate]), select restreints aux champs utiles, Promise.all
      pour les requêtes parallèles (appointments + timeOff) dans getAvailableSlots,
      ensureHolidaysMaterialized idempotent (1 SELECT + 1 INSERT max/année).
  reliability:
    status: CONCERNS
    notes: >-
      Transaction pour create + cancel des RDV impactés ; emails fire-and-forget (réutilisation
      sendCancellationEmail 6.1). TOC/TOU mineur entre le fetch impacted et la transaction
      (REL-002, atténué par défense en profondeur). Risque TZ serveur sur la génération
      hérité (REL-001).
  maintainability:
    status: PASS
    notes: >-
      Helpers purs isolés (holidays.ts, time-off.ts) sans dépendance Prisma. Refactor minimal
      et NON-RÉGRESSIF du générateur (4ᵉ paramètre optionnel timeOffs=[]). JSDoc dense.
      Catalogue toasts étendu (TOAST_MESSAGES.timeOff). Duplication mineure du filtre impacted
      (MAINT-001).

