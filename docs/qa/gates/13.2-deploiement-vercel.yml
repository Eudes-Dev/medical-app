# Quality Gate — Story 13.2 : Déploiement de production Vercel (configuration reproductible)
# Généré par Quinn (Test Architect) via *review (boucle /bmad-loop).
schema: 1
story: "13.2"
story_title: "Déploiement de production Vercel (configuration reproductible)"
gate: PASS
status_reason: >-
  7/7 AC couverts. Corrige un défaut de build Vercel bloquant réel : le client Prisma
  (lib/generated/prisma, gitignoré .gitignore:50, 0 fichier suivi) n'était régénéré par aucun
  `postinstall` ni par le `build` (next build seul) — un build Vercel propre aurait échoué.
  Ajout `postinstall: prisma generate` (régénération portable Vercel/CI/local), durcissement
  vercel.json (regions cdg1 UE/RGPD, framework nextjs, crons 6.2 préservés), module pur testable
  lib/config/required-env.ts + script aide-ops scripts/check-prod-env.ts (non bloquant build),
  runbook docs/ops/13.2-deploiement-vercel.md. Aucun déploiement réel, aucune action en base prod,
  aucun secret committé (OPS-002). Preuve : 6 nouveaux tests unitaires verts, suite complète
  92 fichiers / 806 tests verte, `prisma generate` OK, `next build` OK localement.
reviewer: "Quinn (Test Architect)"
updated: "2026-06-26T19:25:00Z"

waiver:
  active: false

quality_score: 95

top_issues:
  - id: OPS-132
    severity: low
    finding: >-
      L'exécution réelle (vercel link/deploy, pose des variables dans le dashboard Vercel,
      `prisma migrate deploy` en base prod, smoke-test post-déploiement) n'est pas vérifiable
      dans la boucle : ce sont des actions ops/humaines irréversibles ou touchant la production.
    status: open
    mitigation: >-
      Conforme au garde-fou OPS-002 (jamais automatisé en boucle). Intégralement documenté et
      ordonnancé dans docs/ops/13.2-deploiement-vercel.md (étapes marquées 🧑‍🔧). Le risque de
      build cassé — seul point réellement bloquant — est levé et PROUVÉ localement (`next build`
      vert après ajout du postinstall).
  - id: ENV-SCRIPT-132
    severity: low
    finding: >-
      Le script check:prod-env n'est volontairement PAS branché comme porte de `next build` :
      un environnement prod incomplet n'échoue donc pas automatiquement au build.
    status: accepted_by_design
    mitigation: >-
      Choix assumé : brancher la validation sur le build casserait les previews Vercel légitimes
      sans secrets. C'est un aide-ops à exécuter à la demande / dans le runbook. La fonction pure
      validateProductionEnv est, elle, couverte par tests unitaires.

quality_score_notes: >-
  95 (−5 pour OPS-132 : exécution réelle du déploiement non vérifiable en boucle, bornée par la
  preuve locale du build et un runbook complet. ENV-SCRIPT-132 accepté par design, sans impact score).

