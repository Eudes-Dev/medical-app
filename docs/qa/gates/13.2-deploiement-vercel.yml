  tests_status: "6 nouveaux tests unitaires (13.2-UNIT-001..006) verts — fonction pure validateProductionEnv (nominal, manquantes, vides, optionnelles tolérées, garde-fou secrets critiques)"
  full_baseline: "92 fichiers / 806 tests verts (baseline 91/800 + 6 nouveaux tests ; aucune régression)"
  lint: "Inchangé : modules ajoutés (required-env.ts, check-prod-env.ts) typés stricts, sans `as any` ; dette baseline TEST-BASELINE-001 inchangée"
  types: "tsc — modules nouveaux typés (EnvVarSpec/ProductionEnvValidation) ; aucune nouvelle erreur introduite"
  build: "`npm run build` exécuté localement APRÈS ajout du postinstall : succès (table de routes complète, client Prisma régénéré consommé). `npx prisma generate` (commande postinstall) : ✔ Generated Prisma Client 7.3.0."
  risk_summary: >-
    Risque technique faible. La story corrige un bug de build Vercel réel et le prouve localement.
    Changements minimes et réversibles (1 script npm postinstall, 2 clés vercel.json, 1 module pur,
    1 script CLI, tests, doc). Aucune migration, aucune dépendance runtime, aucun secret committé,
    aucune action irréversible. Risque résiduel = exécution ops réelle non observée en boucle (OPS-132).
  trace:
    ac_covered: [1, 2, 3, 4, 5, 6, 7]
    ac_gaps: []
    notes: >-
      AC1 (postinstall) prouvé par `npx prisma generate` OK + `next build` vert consommant le client.
      AC2 (vercel.json regions cdg1 / framework / crons préservés) vérifié par inspection du fichier.
      AC3/AC4 (module pur + script) couverts par 6 tests unitaires + inspection. AC5 (runbook) livré
      et revu (étapes ops marquées, OPS-002 respecté). AC6 (aucune action irréversible / secret) vérifié
      (diff = config/code/doc uniquement ; .env* gitignoré). AC7 (portes locales) prouvé : suite 92/806
      verte + build local vert.

nfr_validation:
  security:
    status: PASS
    notes: >-
      Aucun secret committé (.env* gitignoré, inchangé). Le module n'expose que des NOMS de variables,
      jamais de valeurs. Inventaire des secrets critiques (DATA_ENCRYPTION_KEY, JWT_SECRET, CRON_SECRET)
      verrouillé par un test garde-fou (13.2-UNIT-002) empêchant qu'ils redeviennent optionnels. Région
      cdg1 maintient le compute en UE (cohérence RGPD épopée 11). Runbook rappelle migrate deploy = humain.
  reliability:
    status: PASS
    notes: >-
      Le postinstall rend le build Vercel déterministe (client Prisma toujours présent), supprimant un
      échec de build latent. Crons 6.2 préservés à l'identique. Script de validation distingue
      manquantes/vides pour un diagnostic fiable avant déploiement.
  maintainability:
    status: PASS
    notes: >-
      Module pur, typé, abondamment commenté, aligné sur les patterns existants (lib/analytics/*).
      Inventaire des env unique, dérivé de .env.example. Runbook ordonnançant clairement les étapes
      automatiques vs ops/humaines. Aucune duplication.
  performance:
    status: PASS
    notes: "N/A applicatif. postinstall ajoute une génération Prisma déjà nécessaire ; aucun coût runtime."

