top_issues:
  - id: "REL-001"
    severity: medium
    title: "Fenêtre D-1 cron en heure UTC fixe (drift saisonnier, carry-over)"
    description: >-
      Le cron à 17h UTC = 18h Paris (CET hiver) mais 19h Paris (CEST été). Le rappel J-1 n'est donc
      pas envoyé à heure constante côté patient. Acceptable MVP selon la story ; à rendre
      timezone-aware (date-fns-tz Europe/Paris) dans le cadre de la consolidation TZ (story 5.3).
    refs:
      - "app/api/cron/reminders/route.ts"
    suggested_owner: dev
  - id: "OPS-CRON-001"
    severity: medium
    title: "Cron Vercel non déployé (vercel.json créé, infra 13.x descopée)"
    description: >-
      vercel.json est livré mais l'activation effective du cron dépend du déploiement Vercel
      (épopée 13, backlog post-MVP). Sans déploiement, aucun rappel réel n'est envoyé.
    refs:
      - "vercel.json"
    suggested_owner: po
  - id: "REMIND-FLAG-001"
    severity: low
    title: "sentAt marqué même en cas d'échec d'envoi"
    description: >-
      Choix MVP assumé : reminderD1SentAt/H2SentAt sont posés après le lancement fire-and-forget,
      même si l'email échoue (évite les boucles). MessageLog (FAILED) permet l'audit. À surveiller
      si le taux d'échec Resend devient significatif.
    refs:
      - "app/api/cron/reminders/route.ts"
    suggested_owner: dev

