top_issues:
  - id: "EDIT-001"
    severity: low
    title: "updateAppointment ne nettoie pas serviceTypeId quand le service est désélectionné / archivé"
    description: >-
      Si l'on édite un RDV rattaché à un service ARCHIVÉ (donc absent de la liste active du
      modal), le <select> n'a pas d'option correspondante et, à la soumission, svc est introuvable
      ⇒ serviceTypeId est laissé à undefined côté payload mais conservé (existing.serviceTypeId)
      côté action — voire dropé dans le cas d'une désélection. Le snapshot `type` reste toujours
      intact (aucune perte d'historique). Edge case rare ; à raffiner si l'archivage de services
      rattachés à des RDV futurs devient courant.
    refs:
      - "components/calendar/CreateAppointmentModal.tsx"
      - "app/dashboard/calendar/actions.ts"
    suggested_owner: dev
  - id: "SEC-002"
    severity: low
    status: resolved
    title: "createAppointment/updateAppointment résolvent le service sans filtre active (dashboard)"
    description: >-
      RÉSOLU (apply-qa-fixes 2026-05-31) : createAppointment et updateAppointment sélectionnent
      désormais `active` et rejettent un service archivé (« Ce type de soin est archivé… »).
      2 tests ajoutés (création + édition) — verts. Durcissement de défense en profondeur dashboard.
    refs:
      - "app/dashboard/calendar/actions.ts"
      - "tests/integration/calendar/appointment-actions.test.ts"
    suggested_owner: dev
  - id: "CONTRACT-001"
    severity: low
    title: "appointmentSchema.type : enum statique → string libre"
    description: >-
      type: z.enum(APPOINTMENT_TYPES) est devenu un libellé-instantané libre (string ≤ 60) +
      serviceTypeId UUID. Décision légitime (snapshot historique, autorité serveur sur le label)
      et documentée par le dev/PO. Affaiblit la validation d'entrée brute — acté.
    refs:
      - "lib/validations/appointment.ts"
    suggested_owner: po
  - id: "TEST-001"
    severity: low
    title: "AC 10 (a11y/états UI) et parcours E2E non automatisés"
    description: >-
      Color-picker (radiogroup + aria-label + cible 44px) et états loading/empty/toast vérifiés
      par revue de code. E2E "configurer service public → /book → vérifier durée RDV" différé et
      tracé (carry-over 7.1/7.2).
    refs:
      - "components/settings/color-picker.tsx"
      - "tests/e2e/"
    suggested_owner: dev

