status_reason: >-
  Les 11 ACs sont implémentés et vérifiés sur le code source. Modèle ServiceType +
  migration NON destructive (serviceTypeId nullable, type String conservé en snapshot,
  onDelete:SetNull), palette pure 8 couleurs, Zod double validation, CRUD + suppression
  protégée (HAS_APPOINTMENTS → archivage), getPublicServiceTypes en lecture seule à select
  limité, étape "motif" dans le tunnel avec revalidation serveur active && isPublic (AC 9),
  migration du modal dashboard vers services dynamiques (RDV legacy préservés), accent couleur
  carte sans casser STATUS_STYLES, repli tunnel si aucun service public. 81/81 tests verts sur
  les 6 suites liées à 7.3 (unit colors/zod + intégration actions + régressions tunnel/calendar).
  Sécurité solide. Issues résiduelles de faible sévérité uniquement (edge cases d'édition de
  service archivé, contrat type enum→string acté, E2E différé) — non bloquantes.
