nfr_validation:
  security:
    status: PASS
    notes: >-
      requireUser sur tout le CRUD de gestion ; getPublicServiceTypes seule action publique
      (lecture seule, select limité sans champ interne) ; createGuestBooking revalide
      active && isPublic (défense en profondeur AC 9) ; catch générique sans fuite PII ;
      assertValidUuid sur les écritures par id. Rate-limiter public hérité de 5.3.
  performance:
    status: PASS
    notes: >-
      @@index([active, isPublic]) sur service_types et @@index([serviceTypeId]) sur appointments
      (comptage de suppression protégée) ; Decimal→number en DTO ; pas de surfetch (select ciblé).
  reliability:
    status: PASS
    notes: >-
      Migration non destructive (CREATE TABLE + ADD COLUMN nullable + FK SetNull, aucun
      DROP/NOT NULL) ⇒ pas de back-fill requis, RDV legacy intacts. endTime = slot + durationMin
      correct quel que soit le fuseau serveur (slot = instant ISO ; TZ Paris gérée par 5.3, tests
      verts). Anti-collision (isOverlapping) reste source de vérité ; non-régression grille 7.1.
  maintainability:
    status: PASS
    notes: >-
      Palette pure isolée (module sans Prisma, réutilisable client+serveur), Zod isolé, snapshot
      type documenté, conventions 7.1/7.2 suivies (requireUser/revalidatePath/toasts catalogués).

