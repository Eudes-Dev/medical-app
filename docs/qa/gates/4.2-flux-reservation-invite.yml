    ac_gaps: []

top_issues:
  - id: "CONC-001"
    severity: medium
    title: "Race condition entre anti-collision et création du RDV"
    description: >-
      `createGuestBooking` exécute un `findMany` puis un `create` non transactionnels.
      Deux soumissions concurrentes pour le même créneau peuvent toutes deux passer
      le check d'anti-collision. Impact MVP faible (single-praticien, trafic limité)
      mais à durcir (transaction Serializable ou index unique partiel sur
      (startTime, status != CANCELLED)) avant montée en charge.
    refs:
      - "app/(public)/[cabinet-slug]/book/actions.ts:165-194"
    suggested_owner: dev

  - id: "SEC-001"
    severity: medium
    title: "Rate limiter absent sur createGuestBooking (carry-over 4.1)"
    description: >-
      Server Action publique non authentifiée qui crée des lignes en base. Surface
      d'abus supérieure à `getAvailableSlots`. TODO en place mais non câblé
      (story 13.5). À brancher avant prod.
    refs:
      - "app/(public)/[cabinet-slug]/book/actions.ts:156-158"
    suggested_owner: dev

  - id: "REL-001"
    severity: medium
    title: "TZ serveur dans la requête anti-collision (carry-over 4.1)"
    description: >-
      `startOfDay(slot)` / `endOfDay(slot)` (date-fns) s'appliquent en TZ locale
      serveur. À aligner avec la correction globale Europe/Paris prévue pour 4.1.
      Risque opérationnel faible avec les openingHours actuelles (09:00–18:00 Paris)
      mais incohérence à corriger pour éviter une régression future.
    refs:
      - "app/(public)/[cabinet-slug]/book/actions.ts:168-169"
    suggested_owner: dev

  - id: "DATA-001"
    severity: low
    title: "Lookup patient uniquement par email — pas de garde-fou nom/prénom"
    description: >-
      La Dev Note AC 4 mentionnait une heuristique « si nom/prénom diffèrent
      significativement → nouveau patient ». Non implémenté. Acceptable MVP
      (le praticien fusionne manuellement), à confirmer PO.
    refs:
      - "app/(public)/[cabinet-slug]/book/actions.ts:111-129"
    suggested_owner: po

  - id: "A11Y-001"
    severity: low
    title: "Bouton 'Modifier le créneau' non réellement désactivé pendant submit"
    description: >-
      `<Button asChild disabled>` enveloppant `<Link>` : la prop disabled n'est
      pas portée par l'ancre finale. Utiliser `aria-disabled` + onClick preventDefault.
    refs:
      - "components/public/GuestForm.tsx:181-188"
    suggested_owner: dev

