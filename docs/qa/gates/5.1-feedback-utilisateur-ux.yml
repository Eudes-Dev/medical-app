status_reason: "Implémentation fonctionnellement complète (16/16 AC), 25/25 tests verts et helpers centralisés conformes ; mais plusieurs divergences vs spec rev 1.2 (Skeleton/Button Shadcn dans loading/error pages, EmptyState placé dans wrapper plutôt que data-table, pas de Suspense streaming) et 3 items DoD manuels (build prod, responsive, clavier) non vérifiés."
