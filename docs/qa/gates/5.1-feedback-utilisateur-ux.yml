top_issues:
  - id: "UI-001"
    severity: medium
    finding: "10 fichiers de segment (loading/error/not-found) importent `@/components/ui/button` ou `@/components/ui/skeleton` Shadcn, en violation explicite de la DoD rev 1.2 qui interdit ces imports dans le périmètre de la story."
    suggested_action: "Soit migrer les Button vers `@/components/animate-ui/components/buttons/button` (le Skeleton reste justifié par l'absence amont — documenté), soit formaliser une waiver écrite du PO étendant la divergence Skeleton au Button."
    suggested_owner: dev
  - id: "AC-001"
    severity: medium
    finding: "AC 1 & 2 demandent `<Suspense fallback={...}>` autour de la grille calendrier et de la table patients. L'implémentation utilise un rendu conditionnel `loading && length===0` car les pages sont Client Components (héritage 3.2/3.3, 2.1). L'esprit de l'AC est respecté (skeleton visible pendant le premier fetch) mais la lettre ne l'est pas."
    suggested_action: "Confirmer avec le PO que la divergence est acceptée pour MVP, ou planifier une story dédiée migration Server Components + Suspense streaming."
    suggested_owner: po
  - id: "AC-002"
    severity: low
    finding: "AC 8 désigne `components/patients/patient-data-table.tsx` comme hôte des EmptyState. L'implémentation les place dans `patients-table-wrapper.tsx` (parent). Fonctionnellement équivalent, mais diverge de la spec."
    suggested_action: "Aucune action si l'architecture wrapper/table est validée. Sinon, déplacer la logique dans data-table."
    suggested_owner: dev
  - id: "DOD-001"
    severity: low
    finding: "3 items DoD non vérifiés : (1) `next build && next start` pour valider l'absence de flash blanc sur les 6 loading.tsx, (2) responsive 375/1280 sur EmptyState, (3) navigation clavier sur LoadingButton."
    suggested_action: "Exécuter le QA manuel avant statut « Done »."
    suggested_owner: dev

