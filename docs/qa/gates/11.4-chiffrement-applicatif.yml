  full_baseline: "87 fichiers / 773 tests (baseline 11.3 = 83/752 + 4 fichiers / 21 tests 11.4) ; suite entièrement verte"
  risk_summary: >-
    Risque technique faible : couche additive, transparente côté UI, sans changement de schéma ni
    migration. Rétro-compatibilité éprouvée (legacy en clair lisible). Le principal risque est
    opérationnel (gestion/oubli de clé, CRYPTO-KEY-MGMT) et de conformité/produit (RGPD-PROD-1104),
    tous deux portés hors code et documentés (ADR §6 + livrable ops + ROADMAP).
  trace:
    ac_covered: [1, 2, 3, 4, 5, 6, 7]
    ac_gaps: []
    notes: >-
      AC1 (API module + format enveloppe) par UNIT-001/008 + inspection source. AC2 (clé/rétro-compat)
      par UNIT-001..011 : round-trip, IV unique (2 chiffrés ≠), chaînes limites (vide/accents/multi-
      lignes/longue/emoji), legacy passe-plat même clé activée, altération ciphertext → throw, mauvaise
      clé → throw, enveloppe malformée → throw, sans clé → passe-plat (encrypt) + throw sur enveloppe
      (decrypt), longueur de clé invalide → désactivé. AC3 (notes 9.1) par INT-001..004 (create/update
      chiffrent avant Prisma ; getX déchiffre ; legacy toléré). AC4 (antécédents 9.3) par INT-010..013.
      AC5 (export lisible) par INT-020 (content déchiffré dans le JSON, aucune enveloppe enc: ne fuit) +
      INT-021 (legacy en clair). AC6 (aucun changement de schéma + env + ops) validé : prisma/schema.prisma
      inchangé, .env.example (DATA_ENCRYPTION_KEY), docs/ops/11.4. AC7 (réserve + ROADMAP) présent.

nfr_validation:
  security:
    status: PASS
    notes: >-
      AES-256-GCM (chiffrement AUTHENTIFIÉ : confidentialité + intégrité) ; IV aléatoire unique par
      valeur ; tag vérifié au déchiffrement (altération/mauvaise clé → throw, jamais de contenu corrompu
      silencieux ; UNIT-005/006). Clé jamais loggée. requireUser() + assertValidUuid() des Server
      Actions inchangés (couche additive). Donnée chiffrée sans clé → throw (jamais renvoyée brute,
      UNIT-011). Réserve CRYPTO-KEY-MGMT (clé env, passe-plat silencieux sans clé) portée hors code.
  performance:
    status: PASS
    notes: >-
      Une opération de chiffrement/déchiffrement par champ par écriture/lecture (coût négligeable vs
      l'I/O Prisma). Aucun appel réseau ajouté. Pas de cache de clé (relecture process.env triviale).
  reliability:
    status: PASS
    notes: >-
      Rétro-compatibilité sûre : legacy en clair lisible (pas de big-bang) ; adoption progressive
      (chiffrement à la prochaine écriture / backfill idempotent ops). decryptField lève sur donnée
      illisible (pas de corruption silencieuse). Suites existantes 9.1/9.3/11.2 vertes SANS modification
      (passe-plat sans clé en test).
  maintainability:
    status: PASS
    notes: >-
      Module d'infra fin et mockable (calqué sur lib/storage/medical-documents, lib/server/audit),
      format versionné (rotation future possible). Aucun changement de schéma. Frontière claire
      (chiffrer avant create/update, déchiffrer dans le mapper). ADR §6 + livrable ops documentent
      les décisions et l'activation.

