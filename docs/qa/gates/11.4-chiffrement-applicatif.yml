# Quality Gate — Story 11.4 : Chiffrement applicatif des données cliniques au repos
# Généré par Quinn (Test Architect) via *review.
schema: 1
story: "11.4"
story_title: "Chiffrement applicatif des données cliniques au repos"
gate: PASS
status_reason: >-
  7/7 AC couverts. Module lib/security/crypto AES-256-GCM, enveloppe versionnée
  enc:v1:<iv>:<tag>:<ciphertext> (base64url), IV aléatoire 12 o par valeur, tag 16 o, clé
  DATA_ENCRYPTION_KEY (32 o base64) lue à chaque appel. Chiffrement authentifié (intégrité + confid.) :
  toute altération du ciphertext/tag ou mauvaise clé fait LEVER decryptField (jamais de contenu
  corrompu silencieux). Rétro-compatible : decryptField renvoie le clair tel quel sans préfixe
  enc:v1: (lignes legacy lisibles) ; sans clé → passe-plat (encrypt) mais throw sur enveloppe
  (decrypt). Frontière propre : content chiffré avant create/update et déchiffré dans le mapper pour
  ConsultationNote (9.1) et MedicalHistoryEntry (9.3) ; export RGPD (11.2) déchiffré → JSON lisible
  (art. 20), aucune enveloppe enc: ne fuit. AUCUN changement de schéma ni migration (texte chiffré
  dans la colonne content existante). Suite verte 87 fichiers / 773 tests (+4 fichiers / +21 vs 11.3,
  0 régression — suites 9.1/9.3/11.2 vertes SANS modification grâce au passe-plat sans clé). Sources
  lint propre, tsc sans nouvelle erreur (11 baseline inchangées), build OK.
reviewer: "Quinn (Test Architect)"
updated: "2026-06-26T11:00:00Z"

waiver:
  active: false

quality_score: 88

top_issues:
  - id: RGPD-PROD-1104
    severity: medium
    finding: >-
      11.4 complète le socle RGPD côté code de l'épopée 11 (consentement 11.1, droits 11.2, audit 11.3,
      chiffrement 11.4) mais ne lève PAS automatiquement la réserve de mise en production du dossier
      patient (9.x) : la levée effective dépend de pré-requis OPS et d'un arbitrage produit.
    status: accepted_by_design
    mitigation: >-
      Levée conditionnée à un arbitrage PO/RGPD + pré-requis ops (DATA_ENCRYPTION_KEY posée en prod,
      migrations appliquées, bucket + RLS Storage) documentés dans docs/ops/11.4-chiffrement-applicatif.md
      et le ROADMAP. Réserve cohérente 9.x / 11.1 / 11.2 / 11.3.
  - id: CRYPTO-KEY-MGMT
    severity: medium
    finding: >-
      Clé maîtresse en variable d'environnement (DATA_ENCRYPTION_KEY), sans rotation ni HSM/KMS. Sans
      clé, le chiffrement est DÉSACTIVÉ en silence (passe-plat) : un déploiement prod oubliant la clé
      persisterait les contenus cliniques en clair. La perte de la clé rend les données chiffrées
      irrécupérables.
    status: accepted_by_design
    mitigation: >-
      Choix assumé/documenté (ADR §6, livrable ops) : clé obligatoire en prod (étape ops au même titre
      que migrate deploy), sauvegarde hors base impérative, format versionné (enc:v1:) permettant une
      rotation future. Durcissement (rotation, KMS, garde-fou « refuser de démarrer en prod sans clé »)
      = story ultérieure.
  - id: CRYPTO-SCOPE-RESIDUAL
    severity: low
    finding: >-
      Champs cliniques hors périmètre non chiffrés : Patient.notes (champ legacy non écrit/lu par les
      actions patient, présent seulement dans l'export), Appointment.notes/motif/modalite/lieu, et le
      BINAIRE des documents médicaux (repose sur le chiffrement au repos Supabase Storage).
    status: accepted_by_design
    mitigation: >-
      Périmètre ciblé sur les deux fonds cliniques structurés libres sous réserve RGPD (notes 9.1,
      antécédents 9.3). L'infra lib/security/crypto est générique et couvrira ces champs dans une story
      de durcissement ultérieure. Résiduels documentés (ADR §6, story Dev Notes, ops).

